services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: llms-txt-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-llms_txt_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llms-txt-network

  # Next.js Development Server
  app:
    image: node:20-alpine
    container_name: llms-txt-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-llms_txt_dev}
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Inngest Dev Server configuration
      INNGEST_DEV: "true"
      INNGEST_DEV_SERVER_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ""
      INNGEST_SIGNING_KEY: ""
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - llms-txt-network
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"

  # Inngest Dev Server
  inngest:
    image: node:20-alpine
    container_name: llms-txt-inngest
    restart: unless-stopped
    ports:
      - "8288:8288"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - app
    networks:
      - llms-txt-network
    command: npx inngest-cli@latest dev -u http://app:3000/api/inngest

volumes:
  postgres_data:
    driver: local

networks:
  llms-txt-network:
    driver: bridge
