name: E2E Full Suite

on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger
  #
  # Note: Uses TEST_GROQ_API_KEY (optional) for API calls in tests
  # Falls back to GROQ_API_KEY if TEST_GROQ_API_KEY is not set
  # This allows separate tracking of test vs production API usage

jobs:
  e2e-full:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llms_txt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test

      - name: Run AI integration tests
        run: npm run test:integration:ai
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test
          # Prefer TEST_GROQ_API_KEY, fallback to GROQ_API_KEY if not set
          GROQ_API_KEY: ${{ secrets.TEST_GROQ_API_KEY != '' && secrets.TEST_GROQ_API_KEY || secrets.GROQ_API_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Inngest dev server
        run: npx inngest-cli@latest dev &
        env:
          INNGEST_DEV_SERVER_PORT: 8288

      - name: Wait for Inngest dev server
        run: |
          echo "Waiting for Inngest dev server..."
          for i in {1..30}; do
            if curl -s http://localhost:8288/health > /dev/null; then
              echo "Inngest dev server is ready"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Inngest dev server failed to start"
          exit 1

      - name: Run full E2E suite (including job completion)
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test
          # Prefer TEST_GROQ_API_KEY, fallback to GROQ_API_KEY if not set
          GROQ_API_KEY: ${{ secrets.TEST_GROQ_API_KEY != '' && secrets.TEST_GROQ_API_KEY || secrets.GROQ_API_KEY }}
          INNGEST_DEV: "true"
          INNGEST_BASE_URL: http://localhost:8288
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-e2e
          path: playwright-report/
          retention-days: 7
