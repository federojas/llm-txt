name: CI

on:
  pull_request:
    branches: [main]
  # Removed push to main - Husky pre-commit already validates code
  # This prevents redundant CI runs and speeds up deployments

jobs:
  test:
    runs-on: ubuntu-latest

    # PostgreSQL service for integration tests
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llms_txt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Inngest dev server
        run: npx inngest-cli@latest dev &
        env:
          INNGEST_DEV_SERVER_PORT: 8288

      - name: Wait for Inngest dev server
        run: |
          echo "Waiting for Inngest dev server..."
          for i in {1..30}; do
            if curl -s http://localhost:8288/health > /dev/null; then
              echo "Inngest dev server is ready"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Inngest dev server failed to start"
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llms_txt_test
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INNGEST_DEV: "true"
          INNGEST_BASE_URL: http://localhost:8288
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 7
